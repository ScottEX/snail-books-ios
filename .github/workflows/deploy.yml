name: CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 关键文件完整性
        run: |
          for f in www/index.html www/js/api.js www/js/i18n.js www/js/app.js capacitor.config.json; do
            test -f "$f" || { echo "MISSING: $f"; exit 1; }
          done
          echo "All key files present"
      - name: JS 语法检查
        run: |
          python -c "
          import os, re
          errs = 0
          for root, dirs, files in os.walk('www'):
              for f in files:
                  if f.endswith(('.html','.js')):
                      path = os.path.join(root, f)
                      c = open(path).read()
                      scripts = re.findall(r'<script[^>]*>(.*?)</script>', c, re.DOTALL) if f.endswith('.html') else [c]
                      for i, s in enumerate(scripts):
                          o, c2 = s.count('{'), s.count('}')
                          if o != c2:
                              print('MISMATCH:', path, 'script#'+str(i))
                              errs += 1
          exit(errs)
          "

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: 部署 iOS www 到测试服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/snail-books-ios-staging
            git checkout develop
            git pull origin develop
            echo "iOS staging www updated"

  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 部署 iOS www 到生产服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/snail-books-ios-prod
            git checkout main
            git pull origin main
            echo "iOS production www updated"
