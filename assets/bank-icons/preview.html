<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body { font-family: -apple-system, sans-serif; padding: 20px; background: #f5f5f5; }
h1 { text-align: center; color: #333; }
.grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; max-width: 900px; margin: 0 auto; }
.card { background: #fff; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.card img { width: 48px; height: 48px; object-fit: contain; }
.card p { margin: 8px 0 0; font-size: 12px; color: #666; }
</style>
</head>
<body>
<h1>银行 Logo 预览</h1>
<div class="grid">
<div class="card"><img src="icbc.svg"><p>工商银行</p></div>
<div class="card"><img src="ccb.svg"><p>建设银行</p></div>
<div class="card"><img src="abc.svg"><p>农业银行</p></div>
<div class="card"><img src="boc.svg"><p>中国银行</p></div>
<div class="card"><img src="bocom.svg"><p>交通银行</p></div>
<div class="card"><img src="cmb.svg"><p>招商银行</p></div>
<div class="card"><img src="cib.svg"><p>兴业银行</p></div>
<div class="card"><img src="citic.svg"><p>中信银行</p></div>
<div class="card"><img src="ceb.svg"><p>光大银行</p></div>
<div class="card"><img src="cmbc.svg"><p>民生银行</p></div>
<div class="card"><img src="pab.svg"><p>平安银行</p></div>
<div class="card"><img src="spdb.svg"><p>浦发银行</p></div>
<div class="card"><img src="hxb.svg"><p>华夏银行</p></div>
<div class="card"><img src="gdb.svg"><p>广发银行</p></div>
<div class="card"><img src="bob.svg"><p>北京银行</p></div>
<div class="card"><img src="bosh.svg"><p>上海银行</p></div>
<div class="card"><img src="psbc.svg"><p>邮储银行</p></div>
</div>
</body>
</html>
